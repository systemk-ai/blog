allowBuilds:
  esbuild: true
  sharp: true
# Supply-chain cooldown: refuse versions published less than 1 day (1440 min) ago, so a
# freshly-compromised release is likely yanked from the registry before we install it.
# Exact-version pins we needed sooner are exempted below.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@expressive-code/core@0.44.0'
  - '@expressive-code/plugin-frames@0.44.0'
  - '@expressive-code/plugin-shiki@0.44.0'
  - '@expressive-code/plugin-text-markers@0.44.0'
  - astro-expressive-code@0.44.0
  - expressive-code@0.44.0
  - rehype-expressive-code@0.44.0
